services:
  neo4j:
    image: neo4j:5
    container_name: tesis-neo4j
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/tesis_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
    name: tesis-neo4j-data
  neo4j_logs:
    name: tesis-neo4j-logs
